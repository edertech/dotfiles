# If a config.py file exists, this file is ignored unless it's explicitly loaded
# via config.load_autoconfig(). For more information, see:
# https://github.com/qutebrowser/qutebrowser/blob/master/doc/help/configuring.asciidoc#loading-autoconfigyml
# DO NOT edit this file by hand, qutebrowser will overwrite it.
# Instead, create a config.py - see :help for details.

config_version: 2
settings:
  colors.hints.bg:
    global: qlineargradient(x1:0, y1:0, x2:0, y2:1, stop:0 rgba(255, 247, 133, 0.8),
      stop:1 rgba(255, 197, 66, 0.8))
  colors.hints.fg:
    global: black
  colors.keyhint.fg:
    global: '#FFFFFF'
  colors.webpage.darkmode.enabled:
    global: true
  content.blocking.enabled:
    global: true
  content.blocking.method:
    global: both
  content.canvas_reading:
    global: false
  fonts.debug_console:
    global: default_size default_familyint
  fonts.default_size:
    global: 12pt
  fonts.downloads:
    global: default_size default_family
  fonts.hints:
    global: bold 15pt default_family
  fonts.keyhint:
    global: default_size default_family
  fonts.web.size.default:
    global: 23
  fonts.web.size.minimum:
    global: 18
  fonts.web.size.minimum_logical:
    global: 12
  url.default_page:
    global: https://www.ecosia.org/
  url.incdec_segments:
    global:
    - path
    - query
  url.searchengines:
    global:
      DEFAULT: https://www.ecosia.org/search?q={}
  url.start_pages:
    global: https://www.ecosia.org/
  zoom.default:
    global: 110%
